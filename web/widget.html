<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard status</title>
    <script type="importmap">
      { "imports": { "@shopped/app-runtime": "/a/_runtime/v4/@shopped/app-runtime.js" } }
    </script>
    <link rel="stylesheet" href="./app.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body data-surface="widget">
    <main class="widget-surface">
      <div><p class="eyebrow">Operations</p><h1>Status</h1></div>
      <div id="status" class="status" role="status" aria-live="polite">Loading…</div>
      <strong class="widget-value" data-field="openWork">—</strong>
      <span class="widget-label">open work items</span>
      <p class="updated"><span data-field="onTimeRate">—</span> on time</p>
    </main>
  </body>
</html>
